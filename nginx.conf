# ============================================================
#  nginx.conf — Configuração Nginx para De Gusta Pizzas
#
#  1. Copie para: /etc/nginx/sites-available/de-gusta-pizzas
#  2. Substitua SEU_DOMINIO.COM pelo seu domínio real
#  3. Ative: sudo ln -s /etc/nginx/sites-available/de-gusta-pizzas /etc/nginx/sites-enabled/
#  4. Teste: sudo nginx -t
#  5. Recarregue: sudo systemctl reload nginx
#
#  SSL com Let's Encrypt (após apontar o DNS):
#  sudo apt install certbot python3-certbot-nginx
#  sudo certbot --nginx -d SEU_DOMINIO.COM -d www.SEU_DOMINIO.COM
# ============================================================

server {
    listen 80;
    server_name SEU_DOMINIO.COM www.SEU_DOMINIO.COM;

    # Redirecionar HTTP → HTTPS (ativar após configurar SSL)
    # return 301 https://$host$request_uri;

    # Tamanho máximo de upload
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/de-gusta-pizzas.access.log;
    error_log  /var/log/nginx/de-gusta-pizzas.error.log;

    # Proxy para a aplicação Node.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout generoso para requests lentos
        proxy_read_timeout    60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
    }

    # Cache para assets estáticos do build
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        expires            30d;
        add_header         Cache-Control "public, no-transform";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
}

